# ─────────────────────────────────────────────────────────────────────────────
# VERO SafeGuard — Docker Compose
#
# Single-command startup for evaluators:
#   cp .env.example .env
#   docker compose up --build
#
# Services and their URLs:
#   Rider App        → http://localhost
#   Admin Dashboard  → http://localhost:8080
#   Backend API docs → http://localhost:8000/docs
#
# Startup sequence (health-gated):
#   db (pg_isready) → backend (HTTP /) → frontend + admin-dashboard
#
# All credentials are loaded from .env (gitignored).
# .env.example contains working defaults — no edits needed for demo runs.
#
# Compliance:
#   IRDAI Sandbox Regulation 2023 — parametric trigger thresholds
#   DPDP Act 2023 §5/§7           — OTP, explicit consent, UPI KYC
#   NPCI UPI ecosystem            — VPA validation + bank handle resolution
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vero}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready confirms the server is accepting connections on the right user+db.
      # 10 retries × 5s = 50s max wait — sufficient for cold-start on most hardware.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vero}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    labels:
      - "vero.service=backend"
      - "vero.compliance=IRDAI-Sandbox-2023,DPDP-2023,NPCI-UPI"
      - "vero.ml=IsolationForest+MLPRegressor"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # Suppress .pyc files and enable immediate log output in Docker
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Checks the root health endpoint. 15 retries × 10s + 60s start_period
      # gives the backend up to 210s total for DB migration + ML model loading.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ADMIN_USER: ${VITE_ADMIN_USER}
        VITE_ADMIN_PASS: ${VITE_ADMIN_PASS}
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY}
      cache_from: []
    labels:
      - "vero.service=rider-app"
      - "vero.compliance=DPDP-2023-5-phase-onboarding,NPCI-UPI-KYC"
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin-dashboard:
    build:
      context: ./admin-dashboard
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ADMIN_USER: ${VITE_ADMIN_USER}
        VITE_ADMIN_PASS: ${VITE_ADMIN_PASS}
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY}
      cache_from: []
    labels:
      - "vero.service=admin-dashboard"
      - "vero.compliance=IRDAI-Sandbox-2023"
      - "vero.ml=FraudIntelligence+TriggerSimulator+8kRiderGenerator"
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
