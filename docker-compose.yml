# ─────────────────────────────────────────────────────────────────────────────
# VERO SafeGuard — Docker Compose
#
# Run everything with one command:
#   docker compose up --build
#
# The app opens at http://localhost
# Admin dashboard at http://localhost:8080
# Backend API docs at http://localhost:8000/docs
#
# All secrets (DB password, Razorpay keys, admin API key) are loaded from
# the .env file in this directory. Never commit secrets inline.
#
# To override any variable, set it in your shell before running:
#   set RAZORPAY_KEY_ID=rzp_live_xxxx
#   docker compose up --build
#
# You do NOT need to edit this file for normal use.
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vero}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ADMIN_USER: ${VITE_ADMIN_USER}
        VITE_ADMIN_PASS: ${VITE_ADMIN_PASS}
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY}
      cache_from: []
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin-dashboard:
    build:
      context: ./admin-dashboard
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ADMIN_USER: ${VITE_ADMIN_USER}
        VITE_ADMIN_PASS: ${VITE_ADMIN_PASS}
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY}
      cache_from: []
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
